services:
  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    networks:
      - shared_gateway_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frpc:
    image: snowdreamtech/frpc:latest
    container_name: frpc
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./frpc.toml:/etc/frp/frpc.toml:ro
    # networks:
    #   - shared_gateway_net
    depends_on:
      - nginx-gateway

networks:
  shared_gateway_net:
    external: true
